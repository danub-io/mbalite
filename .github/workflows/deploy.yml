name: Deploy MBA Lite

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and Organize
        run: |
          # 1. Entrar na pasta do portal e gerar o build estático
          cd portal
          npm install
          npm run build
          cd ..

          # 2. Criar a estrutura final que o GitHub Pages espera
          # O basePath no seu next.config.js é /mbalite/portal
          mkdir -p public_final/portal
          
          # 3. Copiar a Landing Page para a raiz
          cp index.html public_final/
          
          # 4. Copiar o portal para a subpasta correta
          cp -r portal/out/* public_final/portal/
          
          # 5. IMPORTANTE: Criar o .nojekyll para evitar o erro 404 nas pastas _next
          touch public_final/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public_final

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4